<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HUD</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="cam-container">
    <!-- Cuando quieras activar el stream real, cambia fondo2.jpg por /stream -->
    <img id="stream" src="/stream" alt="Video Stream">
    <canvas id="overlay"></canvas>

    <div id="controls">
      <button id="btn-left">◀ Izquierda</button>
      <button id="btn-right">Derecha ▶</button>
    </div>
<div id="led-buttons">
<button class="led-btn" data-color="orange"></button>
<button class="led-btn" data-color="purple"></button>
<button class="led-btn" data-color="pink"></button>
<button class="led-btn" data-color="cyan"></button>
<button class="led-btn" data-color="magenta"></button>
<button class="led-btn" data-color="white"></button>
<button class="led-btn" data-color="warmwhite"></button>
<button class="led-btn" data-color="lime"></button>
<button class="led-btn" data-color="skyblue"></button>
<button class="led-btn" data-color="gold"></button>

</div>

  </div>

  <script src="/script.js"></script>
</body>
</html>
